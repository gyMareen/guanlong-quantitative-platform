server:
  port: 8081

spring:
  application:
    name: trading-signal

  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:guanlong}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    topic:
      raw: ${KAFKA_TOPIC_RAW:futu.rebalance.raw}

# Appium 配置
appium:
  host: ${APPIUM_HOST:localhost}
  port: ${APPIUM_PORT:4723}
  platform-name: Android
  automation-name: UiAutomator2
  device-name: ${DEVICE_NAME:emulator-5554}
  app-package: com.futuadvanced.FutuOpenD
  app-activity: .SplashActivity
  no-reset: true
  new-command-timeout: 300

# 采集配置
collector:
  interval: ${COLLECT_INTERVAL:15000}
  retry-count: ${COLLECT_RETRY_COUNT:3}
  element-timeout: 10

logging:
  level:
    com.guanlong.signal: debug
    io.appium: info
